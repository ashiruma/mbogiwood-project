<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Films | Mbogiwood Productions</title>
    
    <!-- Shared styles and scripts -->
    <link rel="stylesheet" href="static/css/style.css">
    <script src="static/js/global.js" defer></script>
    <!-- Add the new script for this page -->
    <script src="static/js/films.js" defer></script>
</head>
<body class="bg-brand-brown text-brand-light font-sans antialiased">

    <!-- Header (Identical to homepage for consistency) -->
    <header class="bg-brand-brown/90 backdrop-blur-md sticky top-0 z-50 border-b border-brand-brown-light">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black tracking-tighter text-white">MBOGIWOOD</a>
            
            <!-- Desktop Navigation -->
            <div class="hidden md:flex items-center space-x-8 font-medium">
                <a href="films.html" class="hover:text-brand-green transition-colors">Films</a>
                <a href="news.html" class="hover:text-brand-green transition-colors">News</a>
                <a href="careers.html" class="hover:text-brand-green transition-colors">Careers</a>
                <a href="about.html" class="hover:text-brand-green transition-colors">About</a>
            </div>
            
            <div class="flex items-center space-x-4">
                <!-- Logged Out State -->
                <div id="logged-out-view">
                    <a href="login.html" class="bg-brand-green hover:bg-brand-green-dark text-white font-bold py-2 px-5 rounded-md transition-colors shadow-lg">
                        Get Started
                    </a>
                </div>

                <!-- Logged In State (Hidden by default) -->
                <div id="logged-in-view" class="hidden">
                    <div class="flex items-center space-x-4">
                        <a href="account.html" class="font-medium hover:text-brand-green">My Account</a>
                        <button id="logout-button" class="bg-brand-brown-light hover:bg-opacity-75 text-brand-light font-bold py-2 px-4 rounded-md text-sm">Logout</button>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="bg-[#1c1411]">
        <div class="container mx-auto px-6 py-16">
            <!-- Page Header -->
            <div class="text-center mb-12">
                <h1 class="text-4xl md:text-5xl font-extrabold text-brand-light tracking-tight">Explore Our Library</h1>
                <p class="mt-4 text-lg text-gray-300">Discover the stories shaping our world.</p>
                <div class="inline-block h-1 w-24 bg-brand-green mt-4"></div>
            </div>

            <!-- Filters and Sorting -->
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <div class="flex gap-4">
                    <!-- Add ID for JS -->
                    <select id="genre-filter" class="bg-brand-brown-light border-gray-600 rounded-md p-2 focus:ring-brand-green focus:border-brand-green">
                        <option value="">All Genres</option>
                        <option value="Drama">Drama</option>
                        <option value="Comedy">Comedy</option>
                        <option value="Thriller">Thriller</option>
                        <option value="Documentary">Documentary</option>
                    </select>
                </div>
                <div>
                    <!-- Add ID for JS -->
                    <select id="sort-filter" class="bg-brand-brown-light border-gray-600 rounded-md p-2 focus:ring-brand-green focus:border-brand-green">
                        <option value="-created_at">Sort by Newest</option>
                        <option value="title">Sort by A-Z</option>
                        <option value="-title">Sort by Z-A</option>
                    </select>
                </div>
            </div>

            <!-- Add ID for the loading indicator -->
            <div id="loading-indicator" class="text-center py-10 hidden">
                <p class="text-lg text-brand-green">Loading films...</p>
            </div>

            <!-- Film Grid - Add ID for JS to populate -->
            <div id="film-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6 md:gap-8">
                <!-- Film cards will be dynamically inserted here by JavaScript -->
            </div>

            <!-- Pagination - Add ID for JS to populate -->
            <div class="flex justify-center mt-16 text-lg">
                <nav id="pagination-container" class="flex items-center space-x-2">
                    <!-- Pagination controls will be dynamically inserted here -->
                </nav>
            </div>
        </div>
    </main>
    
    <!-- Footer (Identical to homepage for consistency) -->
    <footer class="bg-black py-8">
        <div class="container mx-auto px-6 text-center text-gray-400">
            &copy; 2025 MBOGIWOOD. All rights reserved.
        </div>
    </footer>
    
</body>
</html>
